<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #fafaf9; }
  .card {
    width: 700px;
    padding: 28px;
    box-sizing: border-box;
    font-family: "IBM Plex Sans KR", -apple-system, "Apple SD Gothic Neo", sans-serif;
  }
  .row { display: flex; align-items: baseline; gap: 24px; padding: 14px 0; border-bottom: 1px dashed #e7e5e4; }
  .row:last-child { border-bottom: 0; }
  .meta { width: 170px; flex-shrink: 0; font-family: "JetBrains Mono", monospace; font-size: 11px; color: #a8a29e; letter-spacing: 0.04em; }
  .meta strong { color: #78716c; font-weight: 500; }
  .sample { color: #1c1917; letter-spacing: -0.005em; }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="meta"><strong>IBM Plex Sans KR</strong> · display · 40/44 · 500</div>
    <div class="sample" style="font-size:40px; line-height:1.1; font-weight:500;">Claude Code Radar</div>
  </div>
  <div class="row">
    <div class="meta"><strong>IBM Plex Sans KR</strong> · empty state · 28/32 · 400</div>
    <div class="sample" style="font-size:28px; line-height:1.15; font-weight:400;">결과 없음 <span style="color:#a8a29e; font-size:15px; font-weight:300;">— empty state</span></div>
  </div>
  <div class="row">
    <div class="meta"><strong>IBM Plex Sans KR</strong> · h1 · 24/28 · 500</div>
    <div class="sample" style="font-size:24px; line-height:1.3; font-weight:500;">MCP 서버 병렬 시작 최적화</div>
  </div>
</div>
</body>
</html>
