<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fafaf9; }
  .card { width: 700px; padding: 24px; box-sizing: border-box; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .cat {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; background: #fff;
    border: 1px solid #e7e5e4; border-radius: 10px;
  }
  .cat .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 8px;
    font-size: 12px; font-weight: 500;
    border: 1px solid;
  }
  .cat .dot { width: 8px; height: 8px; border-radius: 999px; }
  .cat .ko { font-size: 13px; color: #292524; font-weight: 500; }
  .cat .en { font-family: var(--font-mono); font-size: 10px; color: #a8a29e; letter-spacing: 0.1em; text-transform: uppercase; }
  .cat .meta { display: flex; flex-direction: column; gap: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="cat">
      <span class="chip" style="background:#fffbeb; border-color:#fcd34d; color:#b45309;"><span class="dot" style="background:#fbbf24"></span>핵심</span>
      <div class="meta"><span class="ko">핵심 기능</span><span class="en">core · amber</span></div>
    </div>
    <div class="cat">
      <span class="chip" style="background:#ecfdf5; border-color:#6ee7b7; color:#047857;"><span class="dot" style="background:#34d399"></span>생산성</span>
      <div class="meta"><span class="ko">생산성</span><span class="en">productivity · emerald</span></div>
    </div>
    <div class="cat">
      <span class="chip" style="background:#f0f9ff; border-color:#7dd3fc; color:#0369a1;"><span class="dot" style="background:#38bdf8"></span>통합</span>
      <div class="meta"><span class="ko">통합/연동</span><span class="en">integration · sky</span></div>
    </div>
    <div class="cat">
      <span class="chip" style="background:#f5f3ff; border-color:#c4b5fd; color:#6d28d9;"><span class="dot" style="background:#a78bfa"></span>플랫폼</span>
      <div class="meta"><span class="ko">플랫폼/배포</span><span class="en">platform · violet</span></div>
    </div>
    <div class="cat">
      <span class="chip" style="background:#fff1f2; border-color:#fda4af; color:#be123c;"><span class="dot" style="background:#fb7185"></span>보안</span>
      <div class="meta"><span class="ko">보안/권한</span><span class="en">security · rose</span></div>
    </div>
    <div class="cat">
      <span class="chip" style="background:#fff7ed; border-color:#fdba74; color:#c2410c;"><span class="dot" style="background:#fb923c"></span>DX</span>
      <div class="meta"><span class="ko">개발자 경험</span><span class="en">dx · orange</span></div>
    </div>
  </div>
</div>
</body>
</html>
