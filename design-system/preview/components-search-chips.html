<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fafaf9; }
  .card { width: 700px; padding: 24px; box-sizing: border-box; font-family: var(--font-sans); display: flex; flex-direction: column; gap: 16px;}
  .label { font-family: var(--font-mono); font-size: 10px; color: #78716c; text-transform: uppercase; letter-spacing: 0.15em;}
  .search { position: relative; max-width: 380px; }
  .search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #a8a29e; }
  .search input {
    width: 100%; box-sizing: border-box; background: #fff; border: 1px solid #d6d3d1;
    border-radius: 8px; padding: 10px 14px 10px 36px; font: inherit; font-size: 15px; color: #292524;
  }
  .search input:focus { outline: none; border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.2); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px;
    border: 1px solid #e7e5e4; border-radius: 8px; background: #fff;
    font-size: 13px; color: #57534e; cursor: pointer;
  }
  .chip .dot { width: 8px; height: 8px; border-radius: 999px; }
  .chip .n { color: #a8a29e; font-family: var(--font-mono); font-size: 11px; }
  .chip.active { background: #fffbeb; border-color: #fcd34d; color: #b45309; font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div>
    <div class="label" style="margin-bottom:8px;">Search input</div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M11 11L14.5 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="search" placeholder="기능, 버전, 태그 검색…" value="mcp">
    </div>
  </div>
  <div>
    <div class="label" style="margin-bottom:8px;">Category chips — active + idle</div>
    <div class="chips">
      <div class="chip active"><span class="dot" style="background:#fbbf24"></span>핵심 기능<span class="n">12</span></div>
      <div class="chip"><span class="dot" style="background:#34d399"></span>생산성<span class="n">8</span></div>
      <div class="chip"><span class="dot" style="background:#38bdf8"></span>통합/연동<span class="n">6</span></div>
      <div class="chip"><span class="dot" style="background:#a78bfa"></span>플랫폼/배포<span class="n">4</span></div>
      <div class="chip"><span class="dot" style="background:#fb7185"></span>보안/권한<span class="n">3</span></div>
      <div class="chip"><span class="dot" style="background:#fb923c"></span>개발자 경험<span class="n">9</span></div>
    </div>
  </div>
</div>
</body>
</html>
