<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fafaf9; }
  .card { width: 700px; padding: 24px; box-sizing: border-box; font-family: var(--font-sans); }
  .label { font-family: var(--font-mono); font-size: 10px; color: #78716c; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 10px; }
  .scale { display: flex; gap: 10px; align-items: flex-end; }
  .tok { display:flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: #fbbf24; border-radius: 2px; }
  .name { font-family: var(--font-mono); font-size: 10px; color: #57534e; }
  .px { font-family: var(--font-mono); font-size: 9px; color: #a8a29e; }
</style>
</head>
<body>
<div class="card">
  <div class="label">Spacing — 4px base</div>
  <div class="scale">
    <div class="tok"><div class="bar" style="width:4px; height:4px;"></div><div class="name">1</div><div class="px">4</div></div>
    <div class="tok"><div class="bar" style="width:8px; height:8px;"></div><div class="name">2</div><div class="px">8</div></div>
    <div class="tok"><div class="bar" style="width:12px; height:12px;"></div><div class="name">3</div><div class="px">12</div></div>
    <div class="tok"><div class="bar" style="width:16px; height:16px;"></div><div class="name">4</div><div class="px">16</div></div>
    <div class="tok"><div class="bar" style="width:20px; height:20px;"></div><div class="name">5</div><div class="px">20</div></div>
    <div class="tok"><div class="bar" style="width:24px; height:24px;"></div><div class="name">6</div><div class="px">24</div></div>
    <div class="tok"><div class="bar" style="width:32px; height:32px;"></div><div class="name">8</div><div class="px">32</div></div>
    <div class="tok"><div class="bar" style="width:40px; height:40px;"></div><div class="name">10</div><div class="px">40</div></div>
    <div class="tok"><div class="bar" style="width:48px; height:48px;"></div><div class="name">12</div><div class="px">48</div></div>
    <div class="tok"><div class="bar" style="width:64px; height:64px;"></div><div class="name">16</div><div class="px">64</div></div>
  </div>
</div>
</body>
</html>
