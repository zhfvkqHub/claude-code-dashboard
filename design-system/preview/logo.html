<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fafaf9; }
  .card { width: 700px; padding: 28px; box-sizing: border-box; font-family: var(--font-sans); display: flex; align-items: center; gap: 32px; }
  .mark-big { display: flex; align-items: center; justify-content: center; width: 88px; height: 88px; background: #f59e0b; border-radius: 14px; font-family: var(--font-mono); font-size: 24px; font-weight: 700; color: #1c1917; letter-spacing: 1px; }
  .info h1 { margin: 0; font-size: 22px; font-weight: 600; color: #1c1917; letter-spacing: -0.015em; }
  .info p { margin: 4px 0 0; font-size: 13px; color: #78716c; }
  .info .ver { margin-top: 6px; font-family: var(--font-mono); font-size: 12px; color: #a8a29e; }
  .info .flag { margin-top: 8px; display: inline-block; font-family: var(--font-mono); font-size: 10px; color: #b45309; background: #fffbeb; border: 1px solid #fcd34d; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.1em; }
</style>
</head>
<body>
<div class="card">
  <div class="mark-big">CCR</div>
  <div class="info">
    <h1>Claude Code Radar</h1>
    <p>공식 changelog를 한눈에 — unofficial community dashboard.</p>
    <div class="ver">v2.1.116 · 2026-04-21</div>
    <div class="flag">Placeholder — real mark TBD</div>
  </div>
</div>
</body>
</html>
