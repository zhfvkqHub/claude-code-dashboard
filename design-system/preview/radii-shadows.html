<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fafaf9; }
  .card { width: 700px; padding: 24px; box-sizing: border-box; font-family: var(--font-sans); display:flex; flex-direction:column; gap: 16px; }
  .group { display: flex; flex-direction: column; gap: 8px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: #78716c; text-transform: uppercase; letter-spacing: 0.15em; }
  .radii-row { display: flex; gap: 12px; align-items: flex-end; }
  .radius-box { background: #fff; border: 1px solid #e7e5e4; display: flex; align-items: flex-end; justify-content: center; padding: 6px; font-family: var(--font-mono); font-size: 10px; color: #78716c; }
  .shadow-row { display: flex; gap: 18px; margin-top: 4px; padding: 8px 2px 16px; }
  .shadow-box { width: 120px; height: 64px; background: #fff; border-radius: 8px; display:flex; align-items:center; justify-content:center; font-family: var(--font-mono); font-size: 10px; color: #78716c; }
  .sh-hair { box-shadow: 0 0 0 1px #e7e5e4; }
  .sh-sm { box-shadow: 0 1px 2px rgba(28,25,23,0.04), 0 0 0 1px #e7e5e4; }
  .sh-md { box-shadow: 0 4px 12px rgba(28,25,23,0.06), 0 1px 2px rgba(28,25,23,0.04); }
  .sh-modal { box-shadow: 0 24px 48px -12px rgba(28,25,23,0.25); }
  .sh-ring { box-shadow: 0 0 0 3px rgba(245,158,11,0.2), 0 0 0 1px #f59e0b inset; }
</style>
</head>
<body>
<div class="card">
  <div class="group">
    <div class="label">Radii</div>
    <div class="radii-row">
      <div class="radius-box" style="width:48px; height:48px; border-radius:2px;">sm 2</div>
      <div class="radius-box" style="width:56px; height:56px; border-radius:6px;">md 6</div>
      <div class="radius-box" style="width:64px; height:64px; border-radius:8px;">lg 8</div>
      <div class="radius-box" style="width:72px; height:72px; border-radius:12px;">xl 12</div>
      <div class="radius-box" style="width:56px; height:56px; border-radius:999px;">full</div>
    </div>
  </div>
  <div class="group">
    <div class="label">Shadows</div>
    <div class="shadow-row">
      <div class="shadow-box sh-hair">hair</div>
      <div class="shadow-box sh-sm">sm · hover</div>
      <div class="shadow-box sh-md">md</div>
      <div class="shadow-box sh-modal">modal</div>
      <div class="shadow-box sh-ring">focus ring</div>
    </div>
  </div>
</div>
</body>
</html>
