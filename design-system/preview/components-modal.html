<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fafaf9; }
  .card { width: 700px; padding: 0; box-sizing: border-box; font-family: var(--font-sans); }
  .modal {
    width: 620px; margin: 20px auto; background: #fff; border-radius: 12px;
    box-shadow: 0 24px 48px -12px rgba(28,25,23,0.2);
    overflow: hidden;
  }
  .accent { height: 6px; background: #f59e0b; }
  .inner { padding: 24px 28px; }
  .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .cat { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #b45309; font-weight: 500;}
  .cat .dot { width: 10px; height: 10px; border-radius: 999px; background: #fbbf24; }
  .close { color: #a8a29e; cursor: pointer; }
  h2 { margin: 0 0 6px; font-size: 24px; font-weight: 600; color: #1c1917; letter-spacing: -0.015em; line-height: 1.15; }
  .meta { font-size: 13px; color: #78716c; display: flex; gap: 10px; align-items: center; margin-bottom: 18px;}
  .meta .mono { font-family: var(--font-mono); }
  .meta .dot { color: #d6d3d1; }
  .summary { font-size: 15px; color: #44403c; line-height: 1.55; margin: 0 0 16px; }
  .details { background: #fafaf9; border: 1px solid #e7e5e4; border-radius: 8px; padding: 14px 16px; font-size: 13px; color: #57534e; line-height: 1.6; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="modal">
    <div class="accent"></div>
    <div class="inner">
      <div class="top">
        <div class="cat"><span class="dot"></span>핵심 기능</div>
        <svg class="close" width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M5 5L15 15M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <h2>/resume 대형 세션 성능 대폭 개선</h2>
      <div class="meta"><span class="mono">v2.1.116</span><span class="dot">·</span><span>2026년 4월 20일</span></div>
      <p class="summary">40MB 이상 세션에서 최대 67% 빠른 <code style="background:#f5f5f4;padding:1px 5px;border-radius:3px;">/resume</code>. dead-fork 항목이 많은 세션도 효율적 처리.</p>
      <div class="details">대규모 세션 파일 로드 실패 시 빈 대화가 아닌 에러 리포트를 표시하도록 수정. 50MB 초과 트랜스크립트에서 <code>/branch</code> 거부 문제도 함께 해결.</div>
    </div>
  </div>
</div>
</body>
</html>
